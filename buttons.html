<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .request{
        background-color: black;
        color: white;
        padding: 10px 20px;
        border: none;
        cursor: pointer;
    
    }
    .request:hover{
            background-color:grey;
        
        }
        .add{
            background-color: #fbbf24;
            /* background-color:yellow; */
            color: black;
            /* padding: 10px 20px; */
            border-radius:20px;
            border:none;
            cursor: pointer;
            height:30px;
            width: 150px;
            margin-left: 30px;
        }
        .add:hover{
            background-color: #f59e0b;
            /* background-color:rgba(255, 255, 0, 0.434) */
        }
        .sign{
            background-color:lab(59.0978% -58.6621 41.2579);
            /* background-color:#116329; */
            /* background-color: rgb(26, 144, 26); */
            color: white;
            border-radius: 4px;
            border: none;
            padding: 7px;
            margin-left: 30px;
            cursor: pointer;
        }
        .get{
            background-color: #6645a4;
            /* background-color:#8250df; */
            border: none;
            color: white;
            padding: 7px;
            font-size: 15px;
            border-radius: 3px;
            margin-left: 30px;
            cursor: pointer;
        }
        .get:hover{
            background-color:#46306f;
        }
        .download{
            background-color:white;
            color:grey;
            border-radius: 4px;
            border:1px solid grey;
            padding: 7px;
            margin-left: 30px;
            cursor: pointer;
        }
        .download:hover{
            background-color:grey;
            color:white;
        }
      .div{
        margin-top: 30px;
      }
      .apply{
      background-color:#0969da;
      color: white;
      border-radius: 10px;
      padding: 7px;
      border: none;
      cursor: pointer;
      } 
      .apply:hover{
        background-color: #0550ae;
      }
        .save{
            background-color:white;
            color:#0969da;
            border-radius: 15px;
            /* padding: 10px; */
            width: 50px;
            height: 30px;
            border:1px solid #0969da;
            margin-left: 30px;
            cursor: pointer;
        }
      .save:hover{
        background-color: #a5d6ff;
       border: 2px solid #0969da;
      }

    </style>
</head>
<body>
    <button class="request">Request Now</button>
    <button class="add">Add to Cart</button>
   <button class="sign">Sign up</button>
   <button class="get">Get Started</button> 
   <button class="download">Download</button>
   <div class="div">
    <button class="apply">Apply on company website</button>
    <button class="save">Save</button>
   </div>
</body>
</html>
